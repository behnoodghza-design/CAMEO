<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEWARE — Login</title>

    <!-- Tailwind CSS v3.4 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        /* Spinner for button */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* Input overrides matching the screenshot */
        .luxury-input {
            border: 1px solid #e2e8f0;
            background: white;
            color: #0f172a;
            transition: all 0.2s ease;
        }

        .luxury-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
            outline: none;
        }

        .luxury-input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
    </style>
</head>

<body class="h-full">

    <div class="flex min-h-full items-stretch" x-data="loginForm()">

        <!-- Left Side: Login Form -->
        <div
            class="flex flex-1 flex-col justify-center px-4 py-12 sm:px-6 lg:flex-none lg:w-[45%] xl:w-[40%] bg-slate-50 relative">

            <!-- Logo (Top Left) -->
            <div class="absolute top-8 left-8 sm:top-5 sm:left-12">
                <div class="flex items-center gap-3">
                    <img src="{{ url_for('static', filename='safeware-logo.jpg') }}" alt="SAFEWARE Logo"
                        class="h-[120px] w-auto mix-blend-multiply">
                </div>
            </div>

            <!-- Card Container -->
            <div class="mx-auto w-full max-w-[420px] pt-16 lg:pt-0">

                <div
                    class="bg-white px-8 py-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] rounded-3xl border border-slate-100/60 transition-all">

                    <!-- Form Header -->
                    <div class="mb-8">
                        <h2 class="text-3xl font-[500] text-slate-800 tracking-tight">Welcome Back</h2>
                        <p class="mt-2 text-[13px] text-slate-500">Access the SAFEWARE Hub with your credentials</p>
                    </div>

                    <!-- IDLE / ERROR State -->
                    <template x-if="state === 'idle' || state === 'error'">
                        <div>
                            <!-- Error Alert -->
                            <div x-show="error" x-transition
                                class="mb-5 rounded-xl bg-red-50 border border-red-200 p-3">
                                <div class="flex items-center gap-2">
                                    <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="currentColor"
                                        viewBox="0 0 20 20">
                                        <path fill-rule="evenodd"
                                            d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                            clip-rule="evenodd" />
                                    </svg>
                                    <p class="text-red-700 text-sm font-medium" x-text="error"></p>
                                </div>
                            </div>

                            <form @submit.prevent="submit()" class="space-y-6">
                                <!-- Email -->
                                <div>
                                    <label
                                        class="block text-[11px] font-bold text-slate-500 tracking-[0.1em] uppercase mb-2">Email
                                        Address</label>
                                    <div class="relative">
                                        <div
                                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5">
                                            <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24"
                                                stroke-width="1.5" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                                            </svg>
                                        </div>
                                        <input type="email" x-model="email" required
                                            class="luxury-input w-full rounded-lg py-3 pl-10 pr-4 text-[13px]"
                                            placeholder="you@safeware.com" autocomplete="email">
                                    </div>
                                </div>

                                <!-- Password -->
                                <div>
                                    <label
                                        class="block text-[11px] font-bold text-slate-500 tracking-[0.1em] uppercase mb-2">Password</label>
                                    <div class="relative">
                                        <div
                                            class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5">
                                            <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24"
                                                stroke-width="1.5" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                                            </svg>
                                        </div>
                                        <input :type="showPassword ? 'text' : 'password'" x-model="password" required
                                            class="luxury-input w-full rounded-lg py-3 pl-10 pr-10 text-[13px]"
                                            placeholder="Enter your password" autocomplete="current-password">
                                        <button type="button" @click="showPassword = !showPassword"
                                            class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400 hover:text-slate-600 transition">
                                            <svg x-show="!showPassword" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                                stroke-width="1.5" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                            </svg>
                                            <svg x-show="showPassword" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                                stroke-width="1.5" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>

                                <!-- Submit Button -->
                                <button type="submit"
                                    class="w-full flex items-center justify-center gap-2 rounded-lg bg-[#004c66] px-4 py-3.5 text-sm font-semibold text-white shadow-md hover:bg-[#003d52] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 transition-all mt-6"
                                    :disabled="state === 'loading'">
                                    <template x-if="state === 'loading'">
                                        <div class="spinner"></div>
                                    </template>
                                    <template x-if="state !== 'loading'">
                                        <svg class="w-4 h-4 ml-[-4px]" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                            stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l3 3m0 0l-3 3m3-3H8.25" />
                                        </svg>
                                    </template>
                                    <span x-text="state === 'loading' ? 'Authenticating...' : 'Sign In'"
                                        class="tracking-wide"></span>
                                </button>

                                <div class="mt-8 flex items-center justify-center pb-2">
                                    <div class="w-20 border-t border-slate-200"></div>
                                    <div class="px-3 text-[10px] text-slate-400 font-bold tracking-widest uppercase">OR
                                    </div>
                                    <div class="w-20 border-t border-slate-200"></div>
                                </div>

                            </form>
                        </div>
                    </template>

                    <!-- PENDING State -->
                    <template x-if="state === 'pending'">
                        <div class="text-center py-4" x-transition>
                            <div
                                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-amber-50 border border-amber-100 mb-4">
                                <svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <h3 class="text-xl font-[500] text-slate-800 mb-2">Account Pending</h3>
                            <p class="text-slate-500 text-[13px]">Your account is awaiting approval from your
                                administrator.</p>
                            <button @click="state='idle'; error=null"
                                class="mt-6 text-blue-600 hover:text-blue-500 text-sm font-medium transition">
                                ← Back to Login
                            </button>
                        </div>
                    </template>

                    <!-- LOCKED State -->
                    <template x-if="state === 'locked'">
                        <div class="text-center py-4" x-transition>
                            <div
                                class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 border border-red-100 mb-4">
                                <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                                </svg>
                            </div>
                            <h3 class="text-xl font-[500] text-slate-800 mb-2">Account Locked</h3>
                            <p class="text-slate-500 text-[13px]">Too many failed attempts. Please try again later.</p>
                            <button @click="state='idle'; error=null"
                                class="mt-6 text-blue-600 hover:text-blue-500 text-sm font-medium transition">
                                ← Back to Login
                            </button>
                        </div>
                    </template>

                </div>

                <!-- Bottom Links -->
                <p class="mt-6 text-[12px] text-slate-500 pl-2">
                    Don't have an account?
                    <a href="/auth/register"
                        class="font-[600] text-slate-800 hover:text-[#1a1c21] transition underline underline-offset-4 decoration-slate-300">Create
                        one</a>
                </p>
            </div>
        </div>

        <!-- Right Side: Full Screen Image -->
        <div class="relative hidden w-full flex-1 lg:block bg-[#0a0c10] overflow-hidden">
            <img class="absolute inset-0 h-full w-full object-cover opacity-90 transition-transform duration-[10s] ease-in-out hover:scale-105"
                src="{{ url_for('static', filename='img/auth/chem-tech.png') }}" alt="SAFEWARE Dashboard">

            <div class="absolute inset-0 bg-gradient-to-t from-[#111827]/80 via-transparent to-transparent"></div>

            <div class="absolute bottom-12 left-12 right-12 z-10">
                <p class="text-[12px] font-bold tracking-[0.25em] text-white/70 uppercase mb-3">Enterprise Standard</p>
                <h2 class="text-3xl font-[300] text-white tracking-wide">Advanced Chemical <span
                        class="font-[600]">Analytics & Safety</span></h2>
            </div>

            <!-- Dot decor like the screenshot -->
            <div class="absolute left-0 top-[55%] -translate-y-1/2 -translate-x-1/2 flex items-center h-[500px]">
                <div class="w-3 h-3 rounded-full bg-[#111827] shadow-[0_0_0_10px_rgb(248_250_252)]"></div>
            </div>
        </div>

    </div>

    <script>
        function loginForm() {
            return {
                email: '',
                password: '',
                showPassword: false,
                state: 'idle',  // idle, loading, error, pending, locked
                error: null,

                async submit() {
                    this.state = 'loading';
                    this.error = null;

                    try {
                        const resp = await fetch('/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: this.email,
                                password: this.password
                            })
                        });

                        const data = await resp.json();

                        if (resp.ok && data.success) {
                            window.location.href = data.redirect || '/dashboard';
                        } else if (resp.status === 423) {
                            this.state = 'locked';
                        } else if (resp.status === 403 && data.code === 'ACCOUNT_PENDING') {
                            this.state = 'pending';
                        } else {
                            this.state = 'error';
                            this.error = data.error || 'Authentication failed';
                        }
                    } catch (err) {
                        this.state = 'error';
                        this.error = 'Connection error. Please try again.';
                    }
                }
            }
        }
    </script>
</body>

</html>
