{% extends "base.html" %}
{% block title %}Activity Logs - SAFEWARE{% endblock %}
{% block breadcrumb %}Activity Logs{% endblock %}

{% block content %}
<div x-data="logsApp()" x-init="init()" class="space-y-6 animate-fade-in">

    <!-- Page Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Activity Logs</h1>
            <p class="text-sm text-slate-500 mt-1">Full audit trail of all system and user events</p>
        </div>
        <div class="flex items-center gap-3">
            <!-- Calendar Date Filter -->
            <div class="relative" x-data="{ open: false }">
                <button @click="open = !open"
                    class="inline-flex items-center gap-2 px-4 py-2 border border-slate-200 rounded-lg bg-white text-sm font-medium text-slate-700 hover:border-slate-300 transition">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span x-text="dateRangeLabel">All Time</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
                <div x-show="open" @click.away="open = false" x-transition:enter="transition ease-out duration-100"
                    x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
                    class="absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-xl border border-slate-100 py-1 z-20"
                    style="display:none;">
                    <template x-for="opt in dateOptions" :key="opt.value">
                        <button @click="setDateRange(opt); open = false"
                            class="flex items-center w-full px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition"
                            :class="dateRange === opt.value ? 'font-semibold text-blue-600' : ''">
                            <span x-text="opt.label"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Export Button -->
            <button @click="exportCSV()"
                class="inline-flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg text-sm font-medium hover:bg-slate-700 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Export CSV
            </button>
        </div>
    </div>

    <!-- Category Filters -->
    <div class="flex flex-wrap gap-2">
        <template x-for="cat in categories" :key="cat.value">
            <button @click="activeCategory = (activeCategory === cat.value ? 'ALL' : cat.value)"
                class="inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-semibold transition" :class="activeCategory === cat.value
                        ? 'bg-slate-800 text-white shadow-sm'
                        : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-300'">
                <span x-text="cat.emoji"></span>
                <span x-text="cat.label"></span>
                <span class="ml-0.5 px-1.5 py-0.5 bg-white/20 rounded-full text-xs"
                    x-text="countByCategory(cat.value)"></span>
            </button>
        </template>
    </div>

    <!-- Timeline -->
    <div class="relative">
        <!-- Vertical line -->
        <div class="absolute left-[27px] top-0 bottom-0 w-0.5 bg-slate-200 rounded-full"></div>

        <div class="space-y-2" id="timeline-container">
            <template x-for="(log, idx) in filteredLogs" :key="log.id">
                <div class="relative flex items-start gap-4 group" x-show="log"
                    x-transition:enter="transition ease-out duration-200"
                    x-transition:enter-start="opacity-0 translate-y-2"
                    x-transition:enter-end="opacity-100 translate-y-0">

                    <!-- Timeline Dot -->
                    <div class="relative z-10 flex-shrink-0 w-[56px] flex justify-center pt-3">
                        <div class="w-9 h-9 rounded-full flex items-center justify-center border-2 border-white shadow-sm"
                            :class="{
                                 'bg-blue-100': log.category === 'import',
                                 'bg-purple-100': log.category === 'analysis',
                                 'bg-red-100': log.category === 'alert',
                                 'bg-amber-100': log.category === 'edit',
                                 'bg-slate-100': !log.category || log.category === 'system',
                             }">
                            <!-- Import -->
                            <template x-if="log.category === 'import'">
                                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                </svg>
                            </template>
                            <!-- Analysis -->
                            <template x-if="log.category === 'analysis'">
                                <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10" />
                                </svg>
                            </template>
                            <!-- Alert -->
                            <template x-if="log.category === 'alert'">
                                <svg class="w-4 h-4 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                </svg>
                            </template>
                            <!-- Edit / Delete -->
                            <template x-if="log.category === 'edit'">
                                <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </template>
                            <!-- System fallback -->
                            <template x-if="!log.category || log.category === 'system'">
                                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </template>
                        </div>
                    </div>

                    <!-- Log Card -->
                    <div class="flex-1 bg-white rounded-xl border border-slate-100 p-4 shadow-sm hover:shadow-md transition group-hover:border-slate-200 cursor-pointer"
                        @click="toggleExpand(log)">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <p class="font-semibold text-slate-900 text-sm" x-text="log.title"></p>
                                    <span class="px-2 py-0.5 rounded-full text-xs font-semibold" :class="{
                                              'bg-blue-100 text-blue-700': log.category === 'import',
                                              'bg-purple-100 text-purple-700': log.category === 'analysis',
                                              'bg-red-100 text-red-700': log.category === 'alert',
                                              'bg-amber-100 text-amber-700': log.category === 'edit',
                                              'bg-slate-100 text-slate-600': !log.category || log.category === 'system',
                                          }" x-text="log.category || 'system'"></span>
                                </div>
                                <div class="flex items-center gap-3 mt-1.5">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                        </svg>
                                        <span x-text="log.user || 'System'"></span>
                                    </span>
                                    <span class="text-xs text-slate-400 flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <span x-text="formatTime(log.timestamp)"></span>
                                    </span>
                                </div>
                            </div>
                            <svg class="w-4 h-4 text-slate-400 flex-shrink-0 transition-transform"
                                :class="{'rotate-180': log._expanded}" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>

                        <!-- Expandable Detail -->
                        <div x-show="log._expanded" x-transition:enter="transition ease-out duration-150"
                            x-transition:enter-start="opacity-0 -translate-y-1"
                            x-transition:enter-end="opacity-100 translate-y-0"
                            class="mt-3 pt-3 border-t border-slate-100">
                            <p class="text-sm text-slate-600" x-text="log.detail || 'No additional details.'"></p>
                            <p class="text-xs text-slate-400 mt-2 font-mono" x-text="log.timestamp"></p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <template x-if="filteredLogs.length === 0 && !loading">
                <div class="flex flex-col items-center py-20 text-slate-400 ml-14">
                    <svg class="w-14 h-14 mb-4 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    <p class="font-semibold text-slate-500">No log events found</p>
                    <p class="text-sm mt-1">Try changing the date range or category filter.</p>
                </div>
            </template>

            <!-- Loading Skeletons -->
            <template x-if="loading">
                <template x-for="i in 5" :key="i">
                    <div class="relative flex items-start gap-4">
                        <div class="flex-shrink-0 w-[56px] flex justify-center pt-3">
                            <div class="w-9 h-9 rounded-full bg-slate-200 animate-pulse"></div>
                        </div>
                        <div class="flex-1 bg-white rounded-xl border border-slate-100 p-4 animate-pulse">
                            <div class="h-4 bg-slate-200 rounded w-3/4 mb-2"></div>
                            <div class="h-3 bg-slate-100 rounded w-1/3"></div>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </div>

</div>

<script>
    function logsApp() {
        return {
            allLogs: [],
            loading: true,
            activeCategory: 'ALL',
            dateRange: 'all',
            dateRangeLabel: 'All Time',
            dateOptions: [
                { value: 'all', label: 'All Time' },
                { value: '24h', label: 'Last 24 Hours' },
                { value: '7d', label: 'Last 7 Days' },
                { value: '30d', label: 'Last 30 Days' },
            ],
            categories: [
                { value: 'ALL', label: 'All', emoji: '📋' },
                { value: 'import', label: 'Imports', emoji: '📤' },
                { value: 'analysis', label: 'Analysis', emoji: '🔬' },
                { value: 'alert', label: 'Alerts', emoji: '⚠️' },
                { value: 'edit', label: 'Edits', emoji: '✏️' },
            ],

            get filteredLogs() {
                let logs = this.allLogs;

                // Date filter
                if (this.dateRange !== 'all') {
                    const now = new Date();
                    const cutoff = new Date(now);
                    if (this.dateRange === '24h') cutoff.setHours(cutoff.getHours() - 24);
                    else if (this.dateRange === '7d') cutoff.setDate(cutoff.getDate() - 7);
                    else if (this.dateRange === '30d') cutoff.setDate(cutoff.getDate() - 30);
                    logs = logs.filter(l => new Date(l.timestamp) >= cutoff);
                }

                // Category filter
                if (this.activeCategory !== 'ALL') {
                    logs = logs.filter(l => l.category === this.activeCategory);
                }

                return logs;
            },

            async init() {
                try {
                    const res = await fetch('/api/logs');
                    const data = await res.json();
                    if (data.success) {
                        this.allLogs = (data.data || []).map(l => ({ ...l, _expanded: false }));
                    }
                } catch (e) { console.error(e); }
                this.loading = false;
            },

            toggleExpand(log) {
                log._expanded = !log._expanded;
            },

            setDateRange(opt) {
                this.dateRange = opt.value;
                this.dateRangeLabel = opt.label;
            },

            countByCategory(cat) {
                if (cat === 'ALL') return this.allLogs.length;
                return this.allLogs.filter(l => l.category === cat).length;
            },

            formatTime(ts) {
                if (!ts) return '';
                try {
                    const d = new Date(ts);
                    const now = new Date();
                    const diff = Math.floor((now - d) / 1000);
                    if (diff < 60) return 'Just now';
                    if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
                    if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
                    if (diff < 604800) return `${Math.floor(diff / 86400)} days ago`;
                    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                } catch { return ts; }
            },

            exportCSV() {
                const headers = ['ID', 'Title', 'Detail', 'User', 'Category', 'Timestamp'];
                const rows = this.filteredLogs.map(l => [
                    l.id, `"${(l.title || '').replace(/"/g, '""')}"`,
                    `"${(l.detail || '').replace(/"/g, '""')}"`,
                    l.user, l.category, l.timestamp
                ]);
                const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'safeware_logs.csv'; a.click();
                URL.revokeObjectURL(url);
            }
        }
    }
</script>
{% endblock %}
