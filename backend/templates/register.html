<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFEWARE — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .bg-slide.active {
            opacity: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            outline: none;
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .glass-select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        .glass-select option {
            background: #1e293b;
            color: white;
        }

        .btn-glow {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            box-shadow: 0 6px 30px rgba(59, 130, 246, 0.6);
            transform: translateY(-1px);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* Password strength bar */
        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.4s ease;
        }
    </style>
</head>

<body class="h-full overflow-hidden">
    <!-- Background Slideshow -->
    <div class="fixed inset-0 z-0" x-data="{ current: 0 }"
        x-init="setInterval(() => current = (current + 1) % 4, 8000)">
        <div class="bg-slide" :class="{ 'active': current === 0 }"
            style="background-image: url('{{ url_for('static', filename='img/auth/bg-reaction.png') }}')"></div>
        <div class="bg-slide" :class="{ 'active': current === 1 }"
            style="background-image: url('{{ url_for('static', filename='img/auth/bg-warehouse.png') }}')"></div>
        <div class="bg-slide" :class="{ 'active': current === 2 }"
            style="background-image: url('{{ url_for('static', filename='img/auth/bg-matrix.png') }}')"></div>
        <div class="bg-slide" :class="{ 'active': current === 3 }"
            style="background-image: url('{{ url_for('static', filename='img/auth/bg-refinery.png') }}')"></div>
        <div class="absolute inset-0 bg-gradient-to-br from-slate-900/80 via-slate-900/70 to-blue-900/60"></div>
    </div>

    <!-- Main -->
    <div class="relative z-10 flex h-full items-center justify-center p-4" x-data="registerForm()">
        <div class="w-full max-w-md">

            <!-- Logo -->
            <div class="text-center mb-6">
                <div
                    class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-emerald-500 to-cyan-400 shadow-2xl mb-3">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-white">Create Account</h1>
                <p class="text-white/50 text-sm mt-1">Join your company on SAFEWARE</p>
            </div>

            <!-- Registration Card -->
            <div class="glass-card rounded-2xl p-8">

                <!-- FORM State -->
                <template x-if="state === 'idle' || state === 'error'">
                    <div>
                        <!-- Errors -->
                        <div x-show="errors.length > 0" x-transition
                            class="mb-4 rounded-lg bg-red-500/10 border border-red-500/20 p-3">
                            <template x-for="err in errors" :key="err">
                                <p class="text-red-300 text-xs flex items-center gap-1 mb-1" x-text="'• ' + err"></p>
                            </template>
                        </div>

                        <form @submit.prevent="submit()">
                            <!-- Full Name -->
                            <div class="mb-3">
                                <label
                                    class="block text-white/60 text-xs font-medium mb-1.5 uppercase tracking-wider">Full
                                    Name</label>
                                <input type="text" x-model="fullName" required
                                    class="glass-input w-full px-4 py-2.5 rounded-xl text-sm" placeholder="John Doe">
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label
                                    class="block text-white/60 text-xs font-medium mb-1.5 uppercase tracking-wider">Email</label>
                                <input type="email" x-model="email" required
                                    class="glass-input w-full px-4 py-2.5 rounded-xl text-sm"
                                    placeholder="your@company.com">
                            </div>

                            <!-- Company -->
                            <div class="mb-3">
                                <label
                                    class="block text-white/60 text-xs font-medium mb-1.5 uppercase tracking-wider">Company</label>
                                <select x-model="companyId" required
                                    class="glass-select w-full px-4 py-2.5 rounded-xl text-sm">
                                    <option value="">Select your company...</option>
                                    <template x-for="c in companies" :key="c.id">
                                        <option :value="c.id" x-text="c.name"></option>
                                    </template>
                                </select>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label
                                    class="block text-white/60 text-xs font-medium mb-1.5 uppercase tracking-wider">Password</label>
                                <input type="password" x-model="password" @input="checkStrength()" required
                                    class="glass-input w-full px-4 py-2.5 rounded-xl text-sm"
                                    placeholder="Min 8 chars, A-z, 0-9, !@#">
                                <!-- Strength bar -->
                                <div class="mt-2 flex gap-1">
                                    <div class="strength-bar flex-1"
                                        :class="strength >= 1 ? (strength >= 3 ? 'bg-emerald-500' : strength >= 2 ? 'bg-amber-500' : 'bg-red-500') : 'bg-white/10'">
                                    </div>
                                    <div class="strength-bar flex-1"
                                        :class="strength >= 2 ? (strength >= 3 ? 'bg-emerald-500' : 'bg-amber-500') : 'bg-white/10'">
                                    </div>
                                    <div class="strength-bar flex-1"
                                        :class="strength >= 3 ? 'bg-emerald-500' : 'bg-white/10'"></div>
                                    <div class="strength-bar flex-1"
                                        :class="strength >= 4 ? 'bg-emerald-500' : 'bg-white/10'"></div>
                                </div>
                                <p class="text-xs mt-1"
                                    :class="strength >= 3 ? 'text-emerald-400' : strength >= 2 ? 'text-amber-400' : 'text-white/30'"
                                    x-text="strengthLabel"></p>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-5">
                                <label
                                    class="block text-white/60 text-xs font-medium mb-1.5 uppercase tracking-wider">Confirm
                                    Password</label>
                                <input type="password" x-model="confirmPassword" required
                                    class="glass-input w-full px-4 py-2.5 rounded-xl text-sm"
                                    placeholder="Repeat password">
                            </div>

                            <button type="submit"
                                class="btn-glow w-full py-3 rounded-xl text-white font-semibold text-sm uppercase tracking-wider flex items-center justify-center gap-2"
                                :disabled="state === 'loading'">
                                <template x-if="state === 'loading'">
                                    <div class="spinner"></div>
                                </template>
                                <span x-text="state === 'loading' ? 'Creating Account...' : 'Register'"></span>
                            </button>
                        </form>

                        <p class="text-center text-white/40 text-sm mt-5">
                            Already have an account?
                            <a href="/auth/login" class="text-blue-400 hover:text-blue-300 font-medium transition">Sign
                                In</a>
                        </p>
                    </div>
                </template>

                <!-- SUCCESS State -->
                <template x-if="state === 'success'">
                    <div class="text-center py-6" x-transition>
                        <div
                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/10 border border-emerald-500/20 mb-4">
                            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                        <h3 class="text-xl font-semibold text-white mb-2">Registration Successful!</h3>
                        <p class="text-white/50 text-sm mb-1">Your account has been created.</p>
                        <p class="text-amber-400/80 text-sm">Pending approval from your company administrator.</p>
                        <a href="/auth/login"
                            class="inline-block mt-6 text-blue-400 hover:text-blue-300 text-sm font-medium transition">
                            ← Go to Login
                        </a>
                    </div>
                </template>
            </div>

            <p class="text-center text-white/20 text-xs mt-6">© 2025 SAFEWARE — Enterprise Chemical Safety Platform</p>
        </div>
    </div>

    <script>
        function registerForm() {
            return {
                fullName: '', email: '', password: '', confirmPassword: '',
                companyId: '', companies: [],
                state: 'idle', errors: [],
                strength: 0, strengthLabel: '',

                async init() {
                    try {
                        const resp = await fetch('/api/auth/companies');
                        if (resp.ok) this.companies = await resp.json();
                    } catch (e) { console.error('Failed to load companies:', e); }
                },

                checkStrength() {
                    let s = 0;
                    const p = this.password;
                    if (p.length >= 8) s++;
                    if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
                    if (/\d/.test(p)) s++;
                    if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?~`]/.test(p)) s++;
                    this.strength = s;
                    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
                    this.strengthLabel = labels[s] || '';
                },

                async submit() {
                    this.errors = [];
                    this.state = 'loading';

                    try {
                        const resp = await fetch('/auth/register', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                full_name: this.fullName,
                                email: this.email,
                                password: this.password,
                                confirm_password: this.confirmPassword,
                                company_id: this.companyId
                            })
                        });
                        const data = await resp.json();

                        if (resp.ok && data.success) {
                            this.state = 'success';
                        } else {
                            this.state = 'error';
                            this.errors = data.errors || [data.error || 'Registration failed'];
                        }
                    } catch (err) {
                        this.state = 'error';
                        this.errors = ['Connection error. Please try again.'];
                    }
                }
            }
        }
    </script>
</body>

</html>
